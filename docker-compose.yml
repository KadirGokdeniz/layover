services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ceviri
      POSTGRES_PASSWORD: ceviri
      POSTGRES_DB: ceviri
    ports:
      - "5434:5432"
    volumes:
      - ceviri_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceviri -d ceviri"]
      interval: 3s
      timeout: 3s
      retries: 10

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules    # node_modules host'a sızmasın, container içinde kalsın
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  ceviri_pgdata: