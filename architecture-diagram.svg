<svg width="100%" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Layover system architecture">
<title>Layover system architecture</title>
<desc>Layered architecture showing user interaction with the Vercel frontend, Railway FastAPI backend, PostgreSQL database, and three external AI services</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t14 { font-family: system-ui, -apple-system, BlinkMacSystemFont, Inter, sans-serif; font-size: 14px; font-weight: 500; }
.t12 { font-family: system-ui, -apple-system, BlinkMacSystemFont, Inter, sans-serif; font-size: 12px; font-weight: 400; }
.box-gray { fill: #F1EFE8; stroke: #5F5E5A; }
.text-gray-d { fill: #2C2C2A; }
.text-gray-l { fill: #5F5E5A; }
.box-blue { fill: #E6F1FB; stroke: #185FA5; }
.text-blue-d { fill: #0C447C; }
.text-blue-l { fill: #185FA5; }
.box-teal { fill: #E1F5EE; stroke: #0F6E56; }
.text-teal-d { fill: #085041; }
.text-teal-l { fill: #0F6E56; }
.box-purple { fill: #EEEDFE; stroke: #534AB7; }
.text-purple-d { fill: #3C3489; }
.text-purple-l { fill: #534AB7; }
.connector { stroke: #888; stroke-width: 1.5; fill: none; }
</style>
</defs>

<rect x="240" y="40" width="200" height="50" rx="8" class="box-gray" stroke-width="0.5"/>
<text x="340" y="65" text-anchor="middle" dominant-baseline="central" class="t14 text-gray-d">Personel ve yolcu</text>

<line x1="340" y1="90" x2="340" y2="120" class="connector" marker-end="url(#arrow)"/>

<rect x="200" y="120" width="280" height="60" rx="8" class="box-blue" stroke-width="0.5"/>
<text x="340" y="143" text-anchor="middle" dominant-baseline="central" class="t14 text-blue-d">Frontend</text>
<text x="340" y="161" text-anchor="middle" dominant-baseline="central" class="t12 text-blue-l">Vercel · TanStack + React</text>

<line x1="340" y1="180" x2="340" y2="210" class="connector" marker-end="url(#arrow)"/>

<rect x="60" y="210" width="560" height="70" rx="8" class="box-teal" stroke-width="0.5"/>
<text x="340" y="235" text-anchor="middle" dominant-baseline="central" class="t14 text-teal-d">Backend API</text>
<text x="340" y="258" text-anchor="middle" dominant-baseline="central" class="t12 text-teal-l">Railway · FastAPI · Python</text>

<line x1="115" y1="280" x2="115" y2="310" class="connector" marker-end="url(#arrow)"/>
<line x1="265" y1="280" x2="265" y2="310" class="connector" marker-end="url(#arrow)"/>
<line x1="415" y1="280" x2="415" y2="310" class="connector" marker-end="url(#arrow)"/>
<line x1="565" y1="280" x2="565" y2="310" class="connector" marker-end="url(#arrow)"/>

<rect x="50" y="310" width="130" height="70" rx="8" class="box-gray" stroke-width="0.5"/>
<text x="115" y="335" text-anchor="middle" dominant-baseline="central" class="t14 text-gray-d">PostgreSQL</text>
<text x="115" y="358" text-anchor="middle" dominant-baseline="central" class="t12 text-gray-l">Sözlük + uçuşlar</text>

<rect x="200" y="310" width="130" height="70" rx="8" class="box-purple" stroke-width="0.5"/>
<text x="265" y="335" text-anchor="middle" dominant-baseline="central" class="t14 text-purple-d">Anthropic</text>
<text x="265" y="358" text-anchor="middle" dominant-baseline="central" class="t12 text-purple-l">Claude · tercüme</text>

<rect x="350" y="310" width="130" height="70" rx="8" class="box-purple" stroke-width="0.5"/>
<text x="415" y="335" text-anchor="middle" dominant-baseline="central" class="t14 text-purple-d">ElevenLabs</text>
<text x="415" y="358" text-anchor="middle" dominant-baseline="central" class="t12 text-purple-l">Sesli çıktı (TTS)</text>

<rect x="500" y="310" width="130" height="70" rx="8" class="box-purple" stroke-width="0.5"/>
<text x="565" y="335" text-anchor="middle" dominant-baseline="central" class="t14 text-purple-d">AssemblyAI</text>
<text x="565" y="358" text-anchor="middle" dominant-baseline="central" class="t12 text-purple-l">Sesli giriş (STT)</text>

</svg>
